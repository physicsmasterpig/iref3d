name: iref3d
options:
  bundleIdPrefix: com.iref3d
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  iref3d:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Sidebar
      - path: ContentView
      - path: Models
      - path: Resources
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.iref3d.app
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
      INFOPLIST_KEY_NSMainStoryboardFile: ""
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      PRODUCT_NAME: "iref3d"
      ENABLE_HARDENED_RUNTIME: false
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: "NO"
      SWIFT_OBJC_BRIDGING_HEADER: "iref3d-Bridging-Header.h"
      LIBRARY_SEARCH_PATHS:
        - "$(PROJECT_DIR)/../../core/target/release"
      OTHER_LDFLAGS:
        - "-liref3d_core"
